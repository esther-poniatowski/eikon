# ==================================================================================================
# GitHub Actions Workflow File for the Eikon Package
#
# File: `.github/workflows/ci.yml`
#
# This workflow runs continuous integration checks on every push and pull request to the main branch.
#
# Steps
# -----
# 1. Checkout the repository.
# 2. Set up Python.
# 3. Install dependencies.
# 4. Run Black (formatting check).
# 5. Run Pylint (linting).
# 6. Run MyPy (static type checking).
# 7. Run Pytest (tests with coverage).
# ==================================================================================================

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check Formatting (Black)
        run: black --check --config config/tools/black.toml src/eikon/ tests/

      - name: Lint (Pylint)
        run: pylint --rcfile=config/tools/pylintrc.ini src/eikon/

      - name: Type Check (MyPy)
        run: mypy --config-file=config/tools/mypy.ini src/eikon/

      - name: Test (Pytest)
        run: pytest tests/ --cov=eikon -v --tb=short
